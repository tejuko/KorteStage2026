<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stageopdrachten — Mijn Stage Verslag</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div class="noise"></div>
  <div class="scanline-overlay" aria-hidden="true"></div>
  <div class="ambient-glow" aria-hidden="true"></div>
  <div class="particle-field" id="particleField" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <header class="hero">
    <h1 class="title page-title">STAGEOPDRACHTEN</h1>
    <p class="subtitle">Projecten & opdrachten · Ranking Masters · 2026</p>
  </header>

  <main class="page-layout">

    <a href="index.html" class="page-back">← Terug naar overzicht</a>

    <div class="page-intro">
      <h2>OPDRACHTEN</h2>
      <p>Een overzicht van alle projecten en taken die ik heb uitgevoerd tijdens mijn stage bij Ranking Masters. Klik op een opdracht om de volledige beschrijving te lezen.</p>
    </div>

    <div class="opdracht-grid" id="opdrachtenGrid"></div>

  </main>

  <div class="log-modal daily-book-modal" id="opdrachtModal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="book-view daily-reader">

      <div class="book-topbar">
        <button id="closeOpdrachtModal">SLUITEN</button>
        <div class="page-indicator" id="opdrachtIndicator">OPDRACHT 1 / 1</div>
      </div>

      <div class="book-container">
        <button class="page-btn" id="prevOpdracht">←</button>

        <div class="book-page-v2" id="opdrachtPage">
          <!-- JS vult dit -->
        </div>

        <button class="page-btn" id="nextOpdracht">→</button>
      </div>

    </div>
  </div>

  <script type="module" src="opdrachten.js"></script>

</body>
</html>
